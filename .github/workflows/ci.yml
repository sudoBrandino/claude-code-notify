name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck notify.sh tests/run.sh bundle/build.sh

  test-linux:
    name: tests (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run tests
        run: tests/run.sh

  test-macos:
    name: tests (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: tests/run.sh
      - name: Verify bundle builds
        run: |
          OUT=$(mktemp -d)
          CLAUDE_NOTIFY_BUNDLE_OUT="$OUT" bundle/build.sh
          test -x "$OUT/Claude.app/Contents/MacOS/notify"
